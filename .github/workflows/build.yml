name: Build Kernel with DroidSpaces Support

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-kernel:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc bison flex ccache \
            libssl-dev libncurses-dev \
            python3 python3-pip \
            device-tree-compiler \
            lz4 cpio

      - name: Install LLVM/clang toolchain
        run: |
          sudo apt-get install -y -qq clang lld
          echo "CLANG_VERSION=$(clang --version | head -1)" >> $GITHUB_STEP_SUMMARY

      - name: Install ARM cross compilers
        run: |
          sudo apt-get install -y -qq \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi
          wget -q https://armkeil.blob.core.windows.net/developer/Files/downloads/gnu-rm/10.3-2021.10/gcc-arm-none-eabi-10.3-2021.10-x86_64-linux.tar.bz2
          tar -xf gcc-arm-none-eabi-10.3-2021.10-x86_64-linux.tar.bz2
          echo "$(pwd)/gcc-arm-none-eabi-10.3-2021.10/bin" >> $GITHUB_PATH

      - name: Install boot image tools
        run: |
          pip3 install mkbootimg
          git clone --depth 1 https://android.googlesource.com/platform/system/tools/mkbootimg /tmp/mkbootimg
          echo "/tmp/mkbootimg" >> $GITHUB_PATH

      - name: Prepare kernel source
        run: |
          chmod +x prepare-source.sh
          ./prepare-source.sh
        env:
          KERNEL_REPO: https://github.com/LineageOS/android_kernel_lge_msm8998.git
          KERNEL_BRANCH: lineage-22.2
          KSU_REF: legacy

      - name: Build kernel
        run: |
          chmod +x build-kernel.sh
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          ./build-kernel.sh
        env:
          ARCH: arm64
          SUBARCH: arm64

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-dtb
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
          compression-level: 0

      - name: Show kernel config summary
        run: |
          echo "## Kernel Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          KCONFIG=kernel/out/.config
          if [ -f "$KCONFIG" ]; then
            echo "### DroidSpaces Required Options" >> $GITHUB_STEP_SUMMARY
            for opt in SYSVIPC POSIX_MQUEUE PID_NS UTS_NS IPC_NS NET_NS SECCOMP_FILTER CGROUP_DEVICE CGROUP_PIDS MEMCG DEVTMPFS VETH USER_NS; do
              val=$(grep "^CONFIG_${opt}=" "$KCONFIG" || echo "NOT FOUND")
              echo "- \`CONFIG_${opt}\`: \`${val}\`" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### KernelSU Options" >> $GITHUB_STEP_SUMMARY
            for opt in KSU KSU_MANUAL_HOOK; do
              val=$(grep "^CONFIG_${opt}=" "$KCONFIG" || echo "NOT FOUND")
              echo "- \`CONFIG_${opt}\`: \`${val}\`" >> $GITHUB_STEP_SUMMARY
            done
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -lh kernel/out/arch/arm64/boot/Image.gz-dtb 2>/dev/null || echo "Build output not found" >> $GITHUB_STEP_SUMMARY